name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Find wrangler config
        run: find dist -name "wrangler.json" -o -name "wrangler.toml" 2>/dev/null; ls -la dist/; ls -la dist/server/ 2>/dev/null || echo "no dist/server"

      - name: Remove root wrangler.toml
        run: rm -f wrangler.toml

      - name: Remove .wrangler cache
        run: rm -rf .wrangler

     
